name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-credentials@v1
        with:
          role-to-assume: arn:aws:iam::294983767467:role/Git_Full_Circle
          aws-region: eu-west-2a

      - name: Deploy to Beanstalk
        run: |
          aws elasticbeanstalk create-application-version --application-name TPRM --version-label v1 --source-bundle S3Bucket=the-circle-bucket-294983767467-eu-west-2-an
